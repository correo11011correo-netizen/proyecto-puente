<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Proyecto Puente</title>
    <!-- Evitar Caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="assets/css/style.css?v=3.0">
</head>
<body>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,80 Q50,20 90,80" fill="none" stroke="var(--secondary-color)" stroke-width="8" stroke-linecap="round"/>
                    <rect x="25" y="55" width="8" height="25" fill="white"/>
                    <rect x="67" y="55" width="8" height="25" fill="white"/>
                    <circle cx="50" cy="50" r="10" fill="var(--secondary-color)"/>
                </svg>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="active">Dashboard</a></li>
                    <li><a href="#">Paquetes</a></li>
                    <li><a href="#">Clientes</a></li>
                    <li><a href="index.html">← Volver a Web</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <h2 style="margin-bottom: 20px; color: var(--primary-color);">Panel de Control</h2>
            
            <!-- Metrics -->
            <div class="metric-cards">
                <div class="metric-card">
                    <div class="metric-info">
                        <h3>En Almacén CDE</h3>
                        <h2>45</h2>
                    </div>
                </div>
                <div class="metric-card warning">
                    <div class="metric-info">
                        <h3>En Tránsito</h3>
                        <h2>12</h2>
                    </div>
                </div>
                <div class="metric-card success">
                    <div class="metric-info">
                        <h3>Entregados (Hoy)</h3>
                        <h2>8</h2>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                
                <!-- Table -->
                <div class="dashboard-table-col">
                    <h3 style="margin-bottom: 15px; color: var(--primary-color);">Últimos Movimientos</h3>
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Tracking</th>
                                    <th>Cliente</th>
                                    <th>Destino</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="packages-table-body">
                                <!-- Datos cargados por JS -->
                            </tbody>
                            </table>
                            </div>
                            </div>

                            <!-- Form -->
                            <div class="dashboard-form-col">
                            <h3 style="margin-bottom: 15px; color: var(--primary-color);">Nuevo Ingreso</h3>
                            <form class="admin-form" id="new-package-form">
                            <div class="form-group">
                            <label>Nombre del Cliente</label>
                            <input type="text" id="pkg-client" required placeholder="Ej. Ana Martínez">
                            </div>
                            <div class="form-group">
                            <label>Destino</label>
                            <input type="text" id="pkg-destination" required placeholder="Ej. Córdoba">
                            </div>
                            <div class="form-group">
                            <label>Peso (Kg)</label>
                            <input type="number" id="pkg-weight" step="0.1" required placeholder="0.0">
                            </div>
                            <div class="form-group">
                            <label>Estado Inicial</label>
                            <select id="pkg-status">
                                <option value="Recibido en CDE">Recibido en CDE</option>
                                <option value="Despachando">Despachando</option>
                                <option value="En tránsito">En tránsito</option>
                                <option value="Llegó a destino">Llegó a destino</option>
                                <option value="Listo para retirar">Listo para retirar</option>
                                <option value="Entregado">Entregado</option>
                            </select>
                            </div>
                            <button type="submit" class="btn">Registrar Paquete</button>
                            </form>
                            </div>
                            </div>
                            </main>
                            </div>

                            <!-- Modal para Actualizar Estado -->
                            <div id="update-modal" class="modal-overlay" style="display: none;">
                            <div class="modal-content">
                            <span class="close-modal" id="close-update-modal">&times;</span>
                            <h3 style="margin-bottom: 15px; color: var(--primary-color);">Actualizar Estado</h3>
                            <p style="margin-bottom: 20px; font-size: 0.9rem;">Tracking: <strong id="update-tracking-id"></strong></p>
                            <form id="update-status-form">
                            <input type="hidden" id="update-tracking-input">
                            <div class="form-group">
                            <label>Nuevo Estado</label>
                            <select id="update-status-select" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                            <option value="Recibido en CDE">Recibido en CDE</option>
                            <option value="Despachando">Despachando</option>
                            <option value="En tránsito">En tránsito</option>
                            <option value="Llegó a destino">Llegó a destino</option>
                            <option value="Listo para retirar">Listo para retirar</option>
                            <option value="Entregado">Entregado</option>
                            </select>
                            </div>
                            <div class="form-group" style="margin-top: 15px; margin-bottom: 20px;">
                            <label>Ubicación / Observación (Opcional)</label>
                            <input type="text" id="update-location" placeholder="Ej. Retirar en Sucursal Iguazú" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                            </div>
                            <button type="submit" class="btn" style="width: 100%;">Guardar Cambios</button>
                            </form>
                            </div>
                            </div>

    <script src="assets/js/main.js?v=3.0"></script>
</body>
</html>
